{% extends 'base.html' %}
{% load static %}
{% block content %}

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <div class="container">
    <h2>新規プロトタイプ投稿</h2>
    {% for field in form %}
    <p>
      <label>{{ field.label }}</label>
      {{ field }}
    </p>
    {% endfor %}
    <input type="submit" value="保存する">
  </div>
</form>

{% endblock content %}
