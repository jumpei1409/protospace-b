{% load static %}
<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset='UTF-8'>
  <title>Protospace</title>
</head>

<body>

  <header class="header">
    <a class="logo" href="">
      <span class="logo-sub">SHARE THE PROTOTYPE</span><br>
      <span class="logo-main">PROTO SPACE</span>
    </a>

    {% if user.is_authenticated %}
    <div class="nav">
      <a href="">ログアウト</a>
      <a class="btn-nav" href="">New Proto</a>
    </div>

    {% else %}
    <div class="nav">
      <a class="btn-nav" href={% url "users:sign_in" %}>ログイン</a>
      <a class="btn-nav" href={% url "users:sign_up" %}>新規登録</a>
    </div>

    {% endif %}
  </header>

  {% block content %}{% endblock content %}

  <footer>
    <p>
      Copyright © PROTO SPACE All rights reserved.
    </p>
  </footer>

</body>

</html>
